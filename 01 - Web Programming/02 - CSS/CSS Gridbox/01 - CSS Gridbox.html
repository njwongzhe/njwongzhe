<!DOCTYPE html>
<html lang="en"> 

<head>
    <title>CSS Gridbox</title> 

    <style>
        .box {
            background-color: green;
            border: 1px solid black;
            text-align: center;
            align-content: center;
        }

        .container {
            display: grid;

            /* "fr" unit is a fractional unit and represents a fraction of the available space in the grid container. */

            grid-template-columns: repeat(3, 1fr);          /* Seperate the container into 3 columns with equal width. */
            /* grid-template-columns: 1fr 1fr 1fr; */       /* Seperate the container into 3 columns with equal width. */
            /* grid-template-columns: 2fr 1fr 1fr; */       /* Seperate the container into 3 columns with width of 50%, 25% and 25%. */
            /* grid-template-columns: 100px 100px 100px; */ /* Seperate the container into 3 columns with width of 100px. */
            /* grid-template-columns: 100px 1fr 100px; */   /* Seperate the container into 3 columns with width of 100px, auto and 100px. */

            /* grid-template-rows: repeat(2, 50px); */       /* Seperate the container into 2 rows with height of 100px. */
            grid-template-rows: minmax(50px, 1fr), 1fr, 1fr; /* Seperate the container into 3 rows with height of at least 50px and at most 1fr, 1fr and 1fr. */

            gap: 10px; /* Set the gap between rows and columns to 10px. It is useful when you want to create space between flex items or grid items. */
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
        <div class="box">Box 5</div>
        <div class="box">Box 6</div>
    </div>
</body>

</html>
